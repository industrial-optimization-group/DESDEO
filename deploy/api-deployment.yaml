# deploy/api-deployment.yaml
#
# Deployment, Service, and Route for the DESDEO FastAPI backend.
#
# The Deployment has an ImageChange trigger: whenever the BuildConfig pushes a
# new image to the desdeo-api ImageStream, the pod is replaced with a rolling
# update automatically.
#
# All secrets are consumed as environment variables from the desdeo-secrets
# Secret; no secret values live in this file.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: desdeo-api
  labels:
    app: desdeo-api
  annotations:
    # This annotation tells the OpenShift image change controller to update the
    # Deployment when a new image is pushed to the ImageStream.
    image.openshift.io/triggers: >
      [{"from":{"kind":"ImageStreamTag","name":"desdeo-api:latest"},
        "fieldPath":"spec.template.spec.containers[0].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: desdeo-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0     # zero-downtime: new pod must be ready before old is removed
      maxSurge: 1
  template:
    metadata:
      labels:
        app: desdeo-api
    spec:
      containers:
      - name: api
        # Placeholder: the image change annotation above overwrites this on deploy.
        image: desdeo-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # ── Pulled from Secret ────────────────────────────────────────────
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: desdeo-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: desdeo-secrets
              key: SECRET_KEY
        # ── Static runtime config ─────────────────────────────────────────
        - name: DEBUG
          value: "false"
        # CORS: allow the public webui origin.
        - name: ALLOWED_ORIGINS
          value: "https://gialmisi-desdeo-webui.rahtiapp.fi"
        # ── Gunicorn (matches .s2i/environment) ───────────────────────────
        - name: APP_MODULE
          value: "desdeo.api.app:app"
        - name: GUNICORN_CMD_ARGS
          value: "--bind=0.0.0.0:8080 --workers=1 --access-logfile=- --worker-class uvicorn.workers.UvicornWorker"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
        readinessProbe:
          httpGet:
            path: /health     # adjust if the FastAPI app exposes a different health endpoint
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: desdeo-api
  labels:
    app: desdeo-api
spec:
  selector:
    app: desdeo-api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: desdeo-api
  labels:
    app: desdeo-api
spec:
  host: gialmisi-desdeo-api.rahtiapp.fi
  to:
    kind: Service
    name: desdeo-api
  port:
    targetPort: http
  tls:
    # edge: TLS terminated at the Rahti HAProxy; traffic to the pod is plain HTTP.
    termination: edge
    # Redirect any accidental HTTP requests to HTTPS.
    insecureEdgeTerminationPolicy: Redirect
