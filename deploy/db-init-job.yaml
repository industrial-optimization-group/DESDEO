# deploy/db-init-job.yaml
#
# One-shot Kubernetes Job that runs desdeo/api/db_init_prod.py using the API
# image.  Run this:
#   - After the very first deployment (creates tables + seeds admin user).
#   - After a deliberate database wipe (the script is idempotent on re-run).
#
# The Job is NOT re-triggered automatically on each new image build.
# If you add new tables in a later release use a proper migration tool
# (Alembic) instead of re-running this Job.
#
# Usage:
#   # Replace <IMAGE> with the actual image pullspec, e.g.:
#   #   image-registry.openshift-image-registry.svc:5000/<project>/desdeo-api:latest
#   oc create -f deploy/db-init-job.yaml
#
#   # Watch it:
#   oc logs -f job/desdeo-db-init
#
#   # Clean up after success:
#   oc delete job desdeo-db-init
#
# If you need to re-run it (e.g. to re-seed after a wipe), delete the old Job
# first then create it again.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: desdeo-db-init
  labels:
    app: desdeo-api
    component: db-init
spec:
  # Do not restart the pod on success.
  backoffLimit: 3
  # Auto-clean completed Job pods after 1 hour.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: desdeo-api
        component: db-init
    spec:
      restartPolicy: Never
      containers:
      - name: db-init
        # Use the same image as the API Deployment.
        # Replace <PROJECT> with your Rahti project name.
        image: image-registry.openshift-image-registry.svc:5000/<PROJECT>/desdeo-api:latest
        # Run the production init script.
        command: ["python", "desdeo/api/db_init_prod.py"]
        envFrom:
        # Inject DATABASE_URL, SECRET_KEY, DESDEO_ADMIN_USERNAME,
        # DESDEO_ADMIN_PASSWORD from the shared Secret.
        - secretRef:
            name: desdeo-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
