# deploy/secrets-template.yaml
#
# DO NOT commit real values to git.
#
# Usage:
#   1. Copy this file: cp deploy/secrets-template.yaml deploy/secrets.yaml
#   2. Fill in all <CHANGE_ME> placeholders in deploy/secrets.yaml
#   3. Apply: oc apply -f deploy/secrets.yaml
#   4. Keep deploy/secrets.yaml out of version control.
#
# Generate passwords and keys:
#   python -c "import secrets; print(secrets.token_hex(32))"   # password
#   python -c "import secrets; print(secrets.token_hex(64))"   # JWT key
#   python -c "import secrets; print(secrets.token_hex(24))"   # webhook secret
#
# Or create the main secret directly without a file:
#   oc create secret generic desdeo-secrets \
#     --from-literal=POSTGRES_USER=desdeo \
#     --from-literal=POSTGRES_PASSWORD=<pw> \
#     --from-literal=DB_HOST=desdeo-postgres \
#     --from-literal=DB_PORT=5432 \
#     --from-literal=DB_NAME=desdeo \
#     --from-literal=DB_USER=desdeo \
#     --from-literal=DB_PASSWORD=<pw> \
#     --from-literal=AUTHJWT_SECRET=<64-char-hex> \
#     --from-literal=DESDEO_ADMIN_USERNAME=admin \
#     --from-literal=DESDEO_ADMIN_PASSWORD=<pw> \
#     --from-literal=WEBHOOK_SECRET_API=<24-char-hex> \
#     --from-literal=WEBHOOK_SECRET_WEBUI=<24-char-hex>
#
# Then create the webhook secrets separately:
#   oc create secret generic desdeo-webhook-api \
#     --from-literal=WebHookSecretKey=<same value as WEBHOOK_SECRET_API>
#   oc create secret generic desdeo-webhook-webui \
#     --from-literal=WebHookSecretKey=<same value as WEBHOOK_SECRET_WEBUI>
---
apiVersion: v1
kind: Secret
metadata:
  name: desdeo-secrets
type: Opaque
stringData:
  # Application user created by the OpenShift PostgreSQL image on first start.
  POSTGRES_USER: desdeo
  POSTGRES_PASSWORD: <CHANGE_ME>

  # These are read individually by desdeo/api/config.py in production mode.
  # DB_HOST must match the Kubernetes Service name in postgres.yaml.
  DB_HOST: desdeo-postgres
  DB_PORT: "5432"
  DB_NAME: desdeo
  DB_USER: desdeo
  DB_PASSWORD: <CHANGE_ME> # same value as POSTGRES_PASSWORD above

  # Generate with: python -c "import secrets; print(secrets.token_hex(64))"
  # Never reuse across deployments.
  AUTHJWT_SECRET: <CHANGE_ME>

  # Seeded by the db-init Job. Can be changed after first login.
  DESDEO_ADMIN_USERNAME: admin
  DESDEO_ADMIN_PASSWORD: <CHANGE_ME>

  # Generate with: python -c "import secrets; print(secrets.token_hex(24))"
  # Use different values for API and webui.
  # IMPORTANT: copy the same values into desdeo-webhook-api and
  # desdeo-webhook-webui below — YAML does not support variable references.
  WEBHOOK_SECRET_API: <CHANGE_ME>
  WEBHOOK_SECRET_WEBUI: <CHANGE_ME>
---
apiVersion: v1
kind: Secret
metadata:
  name: desdeo-webhook-api
type: Opaque
stringData:
  # OpenShift's secretReference looks for exactly this key name.
  # Must be the same value as WEBHOOK_SECRET_API above.
  WebHookSecretKey: <CHANGE_ME>
---
apiVersion: v1
kind: Secret
metadata:
  name: desdeo-webhook-webui
type: Opaque
stringData:
  # OpenShift's secretReference looks for exactly this key name.
  # Must be the same value as WEBHOOK_SECRET_WEBUI above.
  WebHookSecretKey: <CHANGE_ME>
