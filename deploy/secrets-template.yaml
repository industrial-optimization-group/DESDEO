# deploy/secrets-template.yaml
#
# DO NOT commit real values to git.
#
# Usage:
#   1. Copy this file: cp deploy/secrets-template.yaml deploy/secrets.yaml
#   2. Fill in all <CHANGE_ME> placeholders in deploy/secrets.yaml
#   3. Apply:  oc apply -f deploy/secrets.yaml
#   4. Keep deploy/secrets.yaml out of version control.
#
# All values must be base64-encoded.  Quick helper:
#   echo -n 'myvalue' | base64
#
# Or use --from-literal to skip manual encoding:
#   oc create secret generic desdeo-secrets \
#     --from-literal=POSTGRES_USER=desdeo \
#     --from-literal=POSTGRES_PASSWORD=<pw> \
#     --from-literal=POSTGRES_SUPERUSER_PASSWORD=<pw> \
#     --from-literal=DATABASE_URL='postgresql://desdeo:<pw>@desdeo-postgres:5432/desdeo' \
#     --from-literal=SECRET_KEY=<random-64-char-hex> \
#     --from-literal=DESDEO_ADMIN_USERNAME=admin \
#     --from-literal=DESDEO_ADMIN_PASSWORD=<pw> \
#     --dry-run=client -o yaml > deploy/secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: desdeo-secrets
type: Opaque
stringData:
  # Application user (non-superuser). Must match DATABASE_URL below.
  POSTGRES_USER: desdeo
  POSTGRES_PASSWORD: <CHANGE_ME>
  # Superuser password (used internally by Bitnami image).
  POSTGRES_SUPERUSER_PASSWORD: <CHANGE_ME>

  # Full DSN consumed by the FastAPI app and db_init_prod.py.
  # Host must be the Kubernetes Service name defined in postgres.yaml.
  DATABASE_URL: "postgresql://desdeo:<CHANGE_ME>@desdeo-postgres:5432/desdeo"

  # JWT / session signing key — generate with:
  #   python -c "import secrets; print(secrets.token_hex(64))"
  SECRET_KEY: <CHANGE_ME>

  # Credentials for the initial analyst user seeded by the db-init Job.
  DESDEO_ADMIN_USERNAME: admin
  DESDEO_ADMIN_PASSWORD: <CHANGE_ME>

  # Random strings used to authenticate GitHub webhook payloads.
  # Generate with:  python -c "import secrets; print(secrets.token_hex(24))"
  WEBHOOK_SECRET_API: <CHANGE_ME>
  WEBHOOK_SECRET_WEBUI: <CHANGE_ME>
